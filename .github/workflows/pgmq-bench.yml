name: PGMQ Benchmark (Single vs Batch)

on:
  workflow_dispatch:
    inputs:
      clients:
        description: '并发客户端数量'
        required: true
        default: '50'
      duration:
        description: '每个测试的持续时间/秒'
        required: true
        default: '20'

jobs:
  benchmark:
    name: Run pgbench
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: ghcr.io/pgmq/pg18-pgmq:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: pgmq_bench
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 PostgreSQL 客户端
        run: |
          sudo apt update
          sudo apt install -y postgresql-client

      - name: 初始化 PGMQ 扩展和队列
        env:
          PGPASSWORD: password
        run: |
          psql -h localhost -U postgres -d pgmq_bench -c "CREATE EXTENSION IF NOT EXISTS pgmq;"
          psql -h localhost -U postgres -d pgmq_bench -c "SELECT pgmq.create('bench_durable');"
          psql -h localhost -U postgres -d pgmq_bench -c "SELECT pgmq.create_unlogged('bench_fast');"

      - name: 生成 pgbench 测试脚本
        run: |
          # === 持久化队列 (Durable) 脚本 ===
          echo "SELECT * FROM pgmq.send(queue_name => 'bench_durable', msg => '{\"t\": 1}');" > send_single_durable.sql
          echo "SELECT * FROM pgmq.send_batch(queue_name => 'bench_durable', msgs => ARRAY['{\"t\":1}','{\"t\":2}','{\"t\":3}','{\"t\":4}','{\"t\":5}']::jsonb[]);" > send_batch_durable.sql
          
          echo "SELECT * FROM pgmq.pop(queue_name => 'bench_durable', qty => 1);" > pop_single_durable.sql
          echo "SELECT * FROM pgmq.pop(queue_name => 'bench_durable', qty => 5);" > pop_batch_durable.sql

          # === 无日志极速队列脚本 ===
          echo "SELECT * FROM pgmq.send(queue_name => 'bench_fast', msg => '{\"t\": 1}');" > send_single_fast.sql
          echo "SELECT * FROM pgmq.send_batch(queue_name => 'bench_fast', msgs => ARRAY['{\"t\":1}','{\"t\":2}','{\"t\":3}','{\"t\":4}','{\"t\":5}']::jsonb[]);" > send_batch_fast.sql
          
          echo "SELECT * FROM pgmq.pop(queue_name => 'bench_fast', qty => 1);" > pop_single_fast.sql
          echo "SELECT * FROM pgmq.pop(queue_name => 'bench_fast', qty => 5);" > pop_batch_fast.sql

      # ==========================================
      # 压测阶段 1: 发送性能对比 (Send)
      # ==========================================
      - name: 压测 1.1 - 持久化队列 (单次发送)
        env:
          PGPASSWORD: password
        run: |
          echo "=== 🧱 持久化队列 - Single Send ==="
          pgbench -h localhost -U postgres -d pgmq_bench -c ${{ github.event.inputs.clients }} -j 2 -T ${{ github.event.inputs.duration }} -f send_single_durable.sql

      - name: 压测 1.2 - 无日志队列 (单次发送)
        env:
          PGPASSWORD: password
        run: |
          echo "=== 🚀 无日志队列 - Single Send ==="
          pgbench -h localhost -U postgres -d pgmq_bench -c ${{ github.event.inputs.clients }} -j 2 -T ${{ github.event.inputs.duration }} -f send_single_fast.sql

      - name: 压测 1.3 - 持久化队列 (批量5条发送)
        env:
          PGPASSWORD: password
        run: |
          echo "=== 🧱 持久化队列 - Batch Send (x5) ==="
          pgbench -h localhost -U postgres -d pgmq_bench -c ${{ github.event.inputs.clients }} -j 2 -T ${{ github.event.inputs.duration }} -f send_batch_durable.sql

      - name: 压测 1.4 - 无日志队列 (批量5条发送)
        env:
          PGPASSWORD: password
        run: |
          echo "=== 🚀 无日志队列 - Batch Send (x5) ==="
          pgbench -h localhost -U postgres -d pgmq_bench -c ${{ github.event.inputs.clients }} -j 2 -T ${{ github.event.inputs.duration }} -f send_batch_fast.sql

      # ==========================================
      # 压测阶段 2: 消费性能对比 (Pop)
      # ==========================================
      - name: 压测 2.1 - 持久化队列 (单次 Pop)
        env:
          PGPASSWORD: password
        run: |
          echo "=== 🧱 持久化队列 - Single Pop ==="
          pgbench -h localhost -U postgres -d pgmq_bench -c ${{ github.event.inputs.clients }} -j 2 -T ${{ github.event.inputs.duration }} -f pop_single_durable.sql

      - name: 压测 2.2 - 无日志队列 (单次 Pop)
        env:
          PGPASSWORD: password
        run: |
          echo "=== 🚀 无日志队列 - Single Pop ==="
          pgbench -h localhost -U postgres -d pgmq_bench -c ${{ github.event.inputs.clients }} -j 2 -T ${{ github.event.inputs.duration }} -f pop_single_fast.sql

      - name: 压测 2.3 - 持久化队列 (批量5条 Pop)
        env:
          PGPASSWORD: password
        run: |
          echo "=== 🧱 持久化队列 - Batch Pop (x5) ==="
          pgbench -h localhost -U postgres -d pgmq_bench -c ${{ github.event.inputs.clients }} -j 2 -T ${{ github.event.inputs.duration }} -f pop_batch_durable.sql

      - name: 压测 2.4 - 无日志队列 (批量5条 Pop)
        env:
          PGPASSWORD: password
        run: |
          echo "=== 🚀 无日志队列 - Batch Pop (x5) ==="
          pgbench -h localhost -U postgres -d pgmq_bench -c ${{ github.event.inputs.clients }} -j 2 -T ${{ github.event.inputs.duration }} -f pop_batch_fast.sql